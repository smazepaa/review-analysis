services:
  redis:
    image: redis:7-alpine
    container_name: review-analysis-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  api:
    build: .
    image: review-analysis-api
    container_name: review-analysis-api
    ports:
      - "8080:8080"
    depends_on:
      - redis
    env_file:
      - path: .env
        required: true
    environment:
      PORT: "8080"
      REDIS_URL: "redis://redis:6379"
      # CACHE_TTL_SECONDS: "21600"  # default: 6 hours
    restart: unless-stopped

volumes:
  redis_data:
